    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3320"/>
      <stop offset="100%" stop-color="#2c1e12"/>
    </linearGradient>
    <radialGradient id="doorGlow" cx="50%" cy="50%" r="50%">
