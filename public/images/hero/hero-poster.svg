<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b2f22"/>
      <stop offset="30%" stop-color="#2e4430"/>
      <stop offset="58%" stop-color="#6b5330"/>
      <stop offset="80%" stop-color="#b0631f"/>
      <stop offset="100%" stop-color="#e08a35"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd58a" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#f2a03e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f2a03e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="canopyMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33512f"/>
      <stop offset="100%" stop-color="#223a24"/>
    </linearGradient>
    <linearGradient id="canopyFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#26402c"/>
      <stop offset="100%" stop-color="#1c3123"/>
