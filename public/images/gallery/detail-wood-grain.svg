<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs><linearGradient id="g_detail_wood_grain" x1="0" y1="0" x2="1200" y2="1200" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#3a2818"/>, <stop offset="50%" stop-color="#5e4727"/>, <stop offset="100%" stop-color="#8a6a3b"/></linearGradient></defs>
  
      <rect width="1200" height="1200" fill="url(#g_detail_wood_grain)"/>
